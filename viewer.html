<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AR Video Viewer</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:Arial,Helvetica,sans-serif}.overlay{position:fixed;z-index:10;inset:0;display:flex;align-items:center;justify-content:center;background:#000c;color:#fff;text-align:center;padding:24px}.panel{max-width:420px}.btn{border:0;border-radius:999px;background:white;color:#111;padding:13px 20px;font:inherit;font-weight:700}.hint{position:fixed;z-index:8;left:0;right:0;bottom:18px;text-align:center;color:white;text-shadow:0 1px 8px #000;font-weight:700}.error{color:#ffb3b3;white-space:pre-wrap}</style>
</head>
<body>
<div id="start" class="overlay"><div class="panel"><h1>Scan the image</h1><p>Tap start, allow camera, then point your phone at the target image.</p><p id="err" class="error"></p><button id="startBtn" class="btn">Start AR</button></div></div>
<div class="hint">Point the camera at the poster/image</div>
<script>
const params = new URLSearchParams(location.search);
const target = params.get('target');
const videoSrc = params.get('video');
const ratio = parseFloat(params.get('ratio') || '1');
const opacity = parseFloat(params.get('opacity') || '1');
const err = document.getElementById('err');
if(!target || !videoSrc){ err.textContent = 'Missing target or video URL. Build the link from index.html first.'; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
document.getElementById('startBtn').addEventListener('click', async ()=>{
  if(!target || !videoSrc) return;
  document.getElementById('start').style.display='none';
  const scene = document.createElement('a-scene');
  scene.setAttribute('mindar-image', `imageTargetSrc: ${target}; autoStart: true; uiScanning: yes; uiLoading: yes; filterMinCF:0.001; filterBeta:0.01`);
  scene.setAttribute('color-space','sRGB');
  scene.setAttribute('renderer','colorManagement: true, physicallyCorrectLights');
  scene.setAttribute('vr-mode-ui','enabled: false');
  scene.setAttribute('device-orientation-permission-ui','enabled: false');
  scene.innerHTML = `
    <a-assets timeout="30000">
      <video id="arVideo" src="${esc(videoSrc)}" preload="auto" crossorigin="anonymous" playsinline webkit-playsinline muted loop></video>
    </a-assets>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity id="targetEntity" mindar-image-target="targetIndex: 0">
      <a-video src="#arVideo" position="0 0 0.01" width="1" height="${ratio}" opacity="${opacity}" rotation="0 0 0"></a-video>
    </a-entity>`;
  document.body.appendChild(scene);
  const video = document.getElementById('arVideo');
  const entity = scene.querySelector('#targetEntity');
  entity.addEventListener('targetFound', async ()=>{ try{ video.currentTime = 0; await video.play(); }catch(e){} });
  entity.addEventListener('targetLost', ()=>{ video.pause(); });
});
window.addEventListener('error', e=>{ if(err) err.textContent = e.message || 'Error loading AR.'; });
</script>
</body>
</html>
