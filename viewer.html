<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Image Video AR Viewer</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:system-ui,Arial,sans-serif;color:#fff}#container{position:fixed;inset:0;overflow:hidden;background:#000}#ui{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;padding:18px;background:linear-gradient(180deg,#000c,#0008)}.panel{max-width:520px;width:100%;background:#151515;border:1px solid #333;border-radius:18px;padding:18px;box-shadow:0 18px 50px #000b}.panel h1{font-size:22px;margin:0 0 8px}.panel p{line-height:1.45;color:#cfcfcf}button{appearance:none;border:0;border-radius:14px;padding:14px 18px;font-weight:900;background:#fff;color:#111;font-size:16px;width:100%;cursor:pointer}.small{font-size:13px;color:#aaa;word-break:break-word}.error{color:#ffb1b1;white-space:pre-wrap}.hud{position:fixed;left:10px;right:10px;bottom:10px;z-index:9;background:#0009;border:1px solid #333;border-radius:12px;padding:9px;font-size:13px;color:#ddd;pointer-events:none}#video{display:none}
  </style>
  <script type="importmap">
  {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","mindar-image-three":"https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"}}
  </script>
</head>
<body>
  <video id="video" playsinline webkit-playsinline crossorigin="anonymous"></video>
  <div id="container"></div>
  <div id="ui"><div class="panel"><h1>Image Video AR</h1><p>Tap start, allow camera, then scan the target image. The video will appear on the image and loop.</p><button id="startBtn">Start camera</button><p id="msg" class="small"></p></div></div>
  <div id="hud" class="hud">Waiting…</div>

<script type="module">
  import * as THREE from 'three';
  import { MindARThree } from 'mindar-image-three';

  const qs = new URLSearchParams(location.search);
  const target = qs.get('target');
  const videoSrc = qs.get('video');
  const aspect = Math.max(0.1, Math.min(10, parseFloat(qs.get('aspect') || '1')));
  const opt = (name, def='1') => (qs.get(name) ?? def) === '1';
  const autoplay = opt('autoplay');
  const loop = opt('loop');
  const muted = opt('muted');
  const hideLost = opt('hideLost');
  const ui = document.getElementById('ui');
  const msg = document.getElementById('msg');
  const hud = document.getElementById('hud');
  const video = document.getElementById('video');
  let started = false;

  function say(t, bad=false){ hud.textContent = t; msg.textContent = t; msg.className = bad ? 'small error':'small'; }

  async function checkUrl(url, label){
    if(!url) throw new Error(label + ' URL is missing.');
    if(!/^https:\/\//i.test(url) && !url.startsWith(location.origin)) throw new Error(label + ' must be HTTPS.');
    try{
      const r = await fetch(url, {method:'GET', mode:'cors', cache:'no-store'});
      if(!r.ok) throw new Error(`${label} returned HTTP ${r.status}.`);
    }catch(e){
      throw new Error(`${label} cannot be loaded. It must be a direct public URL with CORS enabled.\n${e.message}`);
    }
  }

  async function start(){
    if(started) return;
    started = true;
    try{
      say('Checking files…');
      await checkUrl(target, '.mind target');
      // Some video hosts block fetch but still allow video tag. So do not hard-fail video by fetch.
      if(!videoSrc) throw new Error('Video URL is missing.');
      if(!/^https:\/\//i.test(videoSrc) && !videoSrc.startsWith(location.origin)) throw new Error('Video must be HTTPS.');

      video.src = videoSrc;
      video.loop = loop;
      video.muted = muted;
      video.playsInline = true;
      video.setAttribute('playsinline','');
      video.setAttribute('webkit-playsinline','');
      video.crossOrigin = 'anonymous';
      video.load();

      say('Starting camera…');
      const mindarThree = new MindARThree({
        container: document.querySelector('#container'),
        imageTargetSrc: target,
        filterMinCF: 0.0001,
        filterBeta: 0.001
      });
      const {renderer, scene, camera} = mindarThree;
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      const texture = new THREE.VideoTexture(video);
      texture.colorSpace = THREE.SRGBColorSpace;
      const geometry = new THREE.PlaneGeometry(aspect, 1);
      const material = new THREE.MeshBasicMaterial({map:texture, transparent:true, side:THREE.DoubleSide});
      const plane = new THREE.Mesh(geometry, material);
      const anchor = mindarThree.addAnchor(0);
      anchor.group.add(plane);
      plane.visible = !hideLost;

      anchor.onTargetFound = async () => {
        plane.visible = true;
        say('Target found. Playing video.');
        if(autoplay){ try{ await video.play(); }catch(e){ say('Target found, but video autoplay was blocked. Tap screen once.', true); } }
      };
      anchor.onTargetLost = () => {
        say('Target lost. Scan the image again.');
        if(hideLost) plane.visible = false;
        if(hideLost) video.pause();
      };

      await mindarThree.start();
      ui.style.display = 'none';
      renderer.setAnimationLoop(() => renderer.render(scene,camera));
      say('Camera running. Scan the target image.');

      document.body.addEventListener('click', () => { if(autoplay) video.play().catch(()=>{}); }, {once:false});
    }catch(e){
      started = false;
      console.error(e);
      say(e.message || String(e), true);
    }
  }
  document.getElementById('startBtn').addEventListener('click', start);
</script>
</body>
</html>
