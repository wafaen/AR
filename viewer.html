<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Image Video AR Viewer</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:system-ui,Arial,sans-serif;color:#fff}
    #container{position:fixed;inset:0;overflow:hidden;background:#000}
    #ui{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;padding:18px;background:linear-gradient(180deg,#000d,#0009)}
    .panel{max-width:560px;width:100%;background:#151515;border:1px solid #333;border-radius:18px;padding:18px;box-shadow:0 18px 50px #000b}
    h1{font-size:22px;margin:0 0 8px} p{line-height:1.45;color:#d0d0d0} 
    button{appearance:none;border:0;border-radius:14px;padding:15px 18px;font-weight:900;background:#fff;color:#111;font-size:16px;width:100%;cursor:pointer}
    button:disabled{opacity:.55;cursor:not-allowed}.small{font-size:13px;color:#aaa;word-break:break-word}.error{color:#ffb1b1;white-space:pre-wrap}.ok{color:#b7ffca;white-space:pre-wrap}
    .hud{position:fixed;left:10px;right:10px;bottom:10px;z-index:15;background:#000b;border:1px solid #333;border-radius:12px;padding:9px;font-size:13px;color:#ddd;pointer-events:none;white-space:pre-wrap}
    #video{display:none}
  </style>
  <script type="importmap">
    {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","mindar-image-three":"https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"}}
  </script>
</head>
<body>
  <video id="video" playsinline webkit-playsinline crossorigin="anonymous" preload="auto"></video>
  <div id="container"></div>
  <div id="ui">
    <div class="panel">
      <h1>Image Video AR</h1>
      <p>Tap start, allow the camera, then scan the target image. The video appears directly on the target and loops.</p>
      <button id="startBtn" type="button">Start camera</button>
      <p id="msg" class="small">Ready.</p>
    </div>
  </div>
  <div id="hud" class="hud">Ready.</div>

<script type="module">
  const $ = (id) => document.getElementById(id);
  const startBtn = $('startBtn');
  const ui = $('ui');
  const msg = $('msg');
  const hud = $('hud');
  const video = $('video');
  const qs = new URLSearchParams(location.search);

  const target = qs.get('target') || '';
  const videoSrc = qs.get('video') || '';
  const aspect = Math.max(0.1, Math.min(10, parseFloat(qs.get('aspect') || '1')));
  const opt = (name, def='1') => (qs.get(name) ?? def) === '1';
  const autoplay = opt('autoplay', '1');
  const loop = opt('loop', '1');
  const muted = opt('muted', '1');
  const hideLost = opt('hideLost', '1');

  let started = false;
  function say(text, type=''){
    hud.textContent = text;
    msg.textContent = text;
    msg.className = type === 'error' ? 'small error' : type === 'ok' ? 'small ok' : 'small';
  }

  window.addEventListener('error', (e) => say('JavaScript error: ' + e.message, 'error'));
  window.addEventListener('unhandledrejection', (e) => say('Promise error: ' + (e.reason?.message || e.reason), 'error'));

  function requireHttps(url, label){
    if(!url) throw new Error(label + ' URL is missing.');
    if(url.startsWith(location.origin) || /^https:\/\//i.test(url)) return;
    throw new Error(label + ' must be a direct HTTPS URL.');
  }

  async function requestCameraPermissionFirst(){
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      throw new Error('Camera API is not available. Open this page with HTTPS on Chrome/Safari mobile.');
    }
    say('Requesting camera permission…');
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}, audio:false});
    stream.getTracks().forEach(track => track.stop());
    say('Camera permission OK. Loading AR engine…', 'ok');
  }

  async function start(){
    if(started) return;
    started = true;
    startBtn.disabled = true;
    try{
      requireHttps(target, '.mind target');
      requireHttps(videoSrc, 'Video');

      await requestCameraPermissionFirst();

      const THREE = await import('three');
      const mindarModule = await import('mindar-image-three');
      const MindARThree = mindarModule.MindARThree;
      if(!MindARThree) throw new Error('AR engine loaded, but MindARThree was not found.');

      video.src = videoSrc;
      video.loop = loop;
      video.muted = muted;
      video.playsInline = true;
      video.setAttribute('playsinline', '');
      video.setAttribute('webkit-playsinline', '');
      video.crossOrigin = 'anonymous';
      video.load();

      say('Starting image tracker…');
      const mindarThree = new MindARThree({
        container: $('container'),
        imageTargetSrc: target,
        uiLoading: 'no',
        uiScanning: 'no',
        uiError: 'no',
        filterMinCF: 0.0001,
        filterBeta: 0.001
      });

      const {renderer, scene, camera} = mindarThree;
      if(renderer.outputColorSpace !== undefined) renderer.outputColorSpace = THREE.SRGBColorSpace;

      const texture = new THREE.VideoTexture(video);
      if(texture.colorSpace !== undefined) texture.colorSpace = THREE.SRGBColorSpace;
      const geometry = new THREE.PlaneGeometry(aspect, 1);
      const material = new THREE.MeshBasicMaterial({map:texture, side:THREE.DoubleSide});
      const plane = new THREE.Mesh(geometry, material);
      plane.visible = !hideLost;

      const anchor = mindarThree.addAnchor(0);
      anchor.group.add(plane);

      anchor.onTargetFound = async () => {
        plane.visible = true;
        say('Target found. Playing video.', 'ok');
        if(autoplay){
          try { await video.play(); }
          catch(e){ say('Target found, but browser blocked video play. Tap the screen once.', 'error'); }
        }
      };
      anchor.onTargetLost = () => {
        say('Target lost. Scan the target again.');
        if(hideLost) plane.visible = false;
      };

      await mindarThree.start();
      ui.style.display = 'none';
      renderer.setAnimationLoop(() => renderer.render(scene, camera));
      say('Camera running. Scan the target image.', 'ok');
      document.body.addEventListener('click', () => video.play().catch(()=>{}));
    }catch(e){
      console.error(e);
      started = false;
      startBtn.disabled = false;
      say(e.message || String(e), 'error');
    }
  }

  startBtn.addEventListener('click', start);
  say('Ready. Tap Start camera.');
</script>
</body>
</html>
