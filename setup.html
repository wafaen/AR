<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Target Compiler</title>
<link rel="stylesheet" href="setup.css" />
<script type="module">
import { Compiler } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/src/image-target/compiler.js';

const $ = (id) => document.getElementById(id);
const compiler = new Compiler();
let exportedBuffer = null;

function setStatus(msg) { $('status').textContent = msg; }
function loadImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}
function download(buffer, filename) {
  const blob = new Blob([buffer], { type: 'application/octet-stream' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}
$('compile').addEventListener('click', async () => {
  const file = $('targetImage').files[0];
  if (!file) { setStatus('Choose a target image first.'); return; }
  if (file.size > 25 * 1024 * 1024) { setStatus('This file is over 25 MB. Compress it first.'); return; }
  $('compile').disabled = true;
  $('download').disabled = true;
  try {
    setStatus('Loading image…');
    const img = await loadImage(file);
    $('aspect').textContent = `Aspect for config.js: targetWidth ${img.naturalWidth || img.width}, targetHeight ${img.naturalHeight || img.height}`;
    setStatus('Compiling target… keep this tab open.');
    await compiler.compileImageTargets([img], (p) => setStatus(`Compiling: ${p.toFixed(1)}%`));
    exportedBuffer = await compiler.exportData();
    setStatus('Done. Download targets.mind, then put it in /assets/');
    $('download').disabled = false;
  } catch (err) {
    console.error(err);
    setStatus('Compile failed: ' + (err.message || err));
  } finally {
    $('compile').disabled = false;
  }
});
$('download').addEventListener('click', () => exportedBuffer && download(exportedBuffer, 'targets.mind'));
</script>
</head>
<body>
<main>
  <h1>Image target converter</h1>
  <p>Use a clear image target with texture/details. After compiling, place <b>targets.mind</b> inside the <b>assets</b> folder.</p>
  <input id="targetImage" type="file" accept="image/png,image/jpeg,image/webp" />
  <button id="compile">Compile target</button>
  <button id="download" disabled>Download targets.mind</button>
  <p id="status">Waiting…</p>
  <pre id="aspect"></pre>
</main>
</body>
</html>
