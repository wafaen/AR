<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Image Target Video AR</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="config.js"></script>
</head>
<body>
  <div id="startPanel" class="panel">
    <h1>AR Video</h1>
    <p>Tap start, allow camera, then scan your image target.</p>
    <button id="startButton">Start camera</button>
    <p id="status">Waiting…</p>
  </div>

  <div id="hint" class="hint hidden">Scan the printed image</div>

  <a-scene
    id="scene"
    mindar-image="imageTargetSrc: assets/targets.mind; autoStart: false; uiScanning: yes; uiLoading: yes; uiError: yes; filterMinCF: 0.0001; filterBeta: 0.001"
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="colorManagement: true; alpha: true; antialias: true"
    loading-screen="enabled: false">

    <a-assets timeout="30000">
      <video id="arVideo" src="assets/video.mp4" preload="auto" playsinline webkit-playsinline muted autoplay loop crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-video id="videoPlane" src="#arVideo" position="0 0 0" rotation="0 0 0" width="1" height="1"></a-video>
    </a-entity>
  </a-scene>

  <script src="app.js"></script>
</body>
</html>
